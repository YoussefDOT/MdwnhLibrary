name: Task reminders

on:
  schedule:
    # Every 15 minutes, deliberately offset from the top of the hour.
    #
    # Do NOT lower this back to '*/5'. GitHub documents 5 minutes as the
    # minimum but does not honour it on shared runners: sub-15-minute crons
    # on low-traffic repos get deprioritised and dropped, and :00/:15/:30/:45
    # are the most contended slots. Odd offsets land far more reliably.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:   # lets you run it by hand from the Actions tab

concurrency:
  group: reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: tools
        run: npm install --no-audit --no-fund

      - name: Send reminders
        working-directory: tools
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          SITE_URL: https://youssefdot.github.io/MdwnhLibrary
        run: node send-reminders.mjs
